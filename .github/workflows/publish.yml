name: "Publish Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tagName:
        description: "Release tag (e.g., v0.1.1)"
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: "--target x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
          # Uncomment below for macOS builds:
          # - platform: "macos-latest"
          #   args: "--target x86_64-apple-darwin"
          # - platform: "macos-latest"
          #   args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Copy private key to file
        if: matrix.platform != 'windows-latest'
        run: |
          echo "$TAURI_SIGNING_PRIVATE_KEY" > src-tauri/updater.key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Copy private key to file (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          $env:TAURI_SIGNING_PRIVATE_KEY | Out-File -FilePath src-tauri\updater.key -Encoding utf8 -NoNewline
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build & Upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Bank Sampah v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Cleanup private key (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: rm -f src-tauri/updater.key

      - name: Cleanup private key (Windows)
        if: matrix.platform == 'windows-latest'
        run: Remove-Item -Path src-tauri\updater.key -Force -ErrorAction SilentlyContinue
